<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Nothing+You+Could+Do&family=Noto+Sans+JP:wght@100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/destyle.css@4.0.1/destyle.min.css">
    <title>～私のサイト～</title>
</head>
<body>
    <header class="l-header">
        <div class="l-navbar l-wrapper">
            <ul class="c-navbar">
                <li class="c-navbar-text"><a href="./index.html">HOME</a></li>
                <li class="c-navbar-text"><a href="./about.html ">ABOUT US</a></li>
                <li class="c-navbar-text"><a href="./contact.html">CONTACT</a></li>
                <li class="c-navbar-text"><a href="./works.html">WORKS</a></li>
            </ul>
        </div>
    </header>
    <main class="l-main l-wrapper">
        <div class="l-header-title">
            <h1 class="c-header-main-title">Contact</h1>
            <span class="c-header-sub-title">～お問い合わせ～</span>
        </div>
        <div>
            <div class="mb-5 text-center">
                <p>
                    お仕事・ご相談のご連絡は下記よりお願いします。
                    <br>些細なことでも引き受けます。貴方の為に一生懸命取り組みます。
                </p>
                <p>
                    ご連絡お待ちしております。
                </p>
            </div>
            <form action="" class="">
                <div class="mb-3">
                    <label for="name" class="form-label">
                        お名前
                    </label>
                    <input type="text" name="name" id="name" class="form-control" placeholder="お名前">
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">
                        メールアドレス
                    </label>
                    <input type="email" name="email" id="email" class="form-control" placeholder="メールアドレス">
                </div>
                <div class="mb-3">
                    <label for="subject" class="form-label" placeholder="件名">
                        件名
                    </label>
                    <input type="text" name="subject" id="subject" class="form-control" placeholder="件名">
                </div>
                <div class="mb-3">
                    <label for="message" class="form-label">
                        メッセージ
                    </label>
                    <textarea name="message" id="message"class="form-control form-control-lg" placeholder="メッセージ"></textarea>
                </div>
                
            </form>
        </div>



    </main>
    <footer>

    </footer>

</body>

</html>
